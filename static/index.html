<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moose App</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

<!-- ===== AUTH SECTION ===== -->
<div id="authSection" class="auth-wrapper">
  <div class="auth-card">
    <a href="#" class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#4f46e5"/><path d="M8 20V10l6 6 6-6v10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Moose
    </a>

    <!-- Tab nav -->
    <div class="tab-nav" id="authTabs">
      <button class="tab-btn active" data-tab="login">Sign in</button>
      <button class="tab-btn" data-tab="register">Register</button>
      <button class="tab-btn" data-tab="forgot" style="display:none" id="forgotTab">Reset</button>
    </div>

    <!-- Alert -->
    <div class="alert" id="authAlert"></div>

    <!-- Login -->
    <div class="tab-panel active" id="loginPanel">
      <div class="form-group">
        <label for="loginUser">Email or username</label>
        <input id="loginUser" type="text" placeholder="you@example.com" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="loginPass">Password</label>
        <input id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div style="text-align:right;margin-bottom:1rem">
        <a href="#" class="link" id="forgotLink">Forgot password?</a>
      </div>
      <button class="btn btn-primary btn-full" id="loginBtn">Sign in</button>
    </div>

    <!-- Register -->
    <div class="tab-panel" id="registerPanel">
      <div class="form-group">
        <label for="regEmail">Email</label>
        <input id="regEmail" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="regUsername">Username</label>
        <input id="regUsername" type="text" placeholder="cooluser" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="regPass">Password</label>
        <input id="regPass" type="password" placeholder="••••••••" autocomplete="new-password" />
        <div class="pw-strength" id="regStrength">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>
      <button class="btn btn-primary btn-full" id="registerBtn">Create account</button>
    </div>

    <!-- Forgot password -->
    <div class="tab-panel" id="forgotPanel">
      <p style="font-size:.875rem;color:var(--text-muted);margin-bottom:1rem">Enter your email and we'll send a reset link.</p>
      <div class="form-group">
        <label for="forgotEmail">Email</label>
        <input id="forgotEmail" type="email" placeholder="you@example.com" />
      </div>
      <button class="btn btn-primary btn-full" id="forgotBtn">Send reset link</button>
      <div style="margin-top:.75rem;text-align:center">
        <a href="#" class="link" id="backToLoginLink">Back to sign in</a>
      </div>
    </div>

    <!-- Reset password (shown from URL) -->
    <div class="tab-panel" id="resetPanel">
      <p style="font-size:.875rem;color:var(--text-muted);margin-bottom:1rem">Choose a new password for your account.</p>
      <input type="hidden" id="resetToken" />
      <div class="form-group">
        <label for="resetPass">New password</label>
        <input id="resetPass" type="password" placeholder="••••••••" autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label for="resetPassConfirm">Confirm password</label>
        <input id="resetPassConfirm" type="password" placeholder="••••••••" autocomplete="new-password" />
      </div>
      <button class="btn btn-primary btn-full" id="resetBtn">Reset password</button>
    </div>
  </div>
</div>

<!-- ===== APP SECTION ===== -->
<div id="appSection" class="app-wrapper">

  <!-- Topbar -->
  <header class="topbar">
    <a href="#" class="logo">
      <svg width="24" height="24" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="7" fill="#4f46e5"/><path d="M8 20V10l6 6 6-6v10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Moose
    </a>
    <div class="topbar-actions">
      <a href="/static/admin.html" id="adminLink" style="display:none;font-size:.875rem;color:var(--text-muted);text-decoration:none">Admin</a>
      <button class="avatar-btn" id="avatarBtn" title="Profile"></button>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">Sign out</button>
    </div>
  </header>

  <!-- Main -->
  <main class="main-content">
    <div class="alert" id="appAlert"></div>

    <!-- Welcome -->
    <div class="welcome-card">
      <h2 id="welcomeHeading">Welcome back!</h2>
      <p id="welcomeSub">You're signed in to Moose Web App Lite.</p>
    </div>

    <!-- Tab nav -->
    <div class="tab-nav">
      <button class="tab-btn active" data-apptab="dashboard">Dashboard</button>
      <button class="tab-btn" data-apptab="profile">Profile</button>
      <button class="tab-btn" data-apptab="security">Security</button>
    </div>

    <!-- Dashboard tab -->
    <div class="tab-panel active" id="dashboardPanel">
      <div class="card">
        <div class="card-header">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          Account Info
        </div>
        <div class="card-body">
          <p style="margin:0 0 .25rem"><strong id="infoDisplayName"></strong></p>
          <p style="margin:0 0 .25rem;font-size:.875rem;color:var(--text-muted)" id="infoEmail"></p>
          <p style="margin:0 0 .25rem;font-size:.875rem;color:var(--text-muted)">@<span id="infoUsername"></span></p>
          <div class="meta-row">
            <span>Member since <span id="infoCreated"></span></span>
            <span>·</span>
            <span>Last login <span id="infoLastLogin"></span></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Profile tab -->
    <div class="tab-panel" id="profilePanel">
      <div class="card">
        <div class="card-header">Edit Profile</div>
        <div class="card-body">
          <div class="alert" id="profileAlert"></div>
          <div class="form-group">
            <label for="profileDisplayName">Display name</label>
            <input id="profileDisplayName" type="text" placeholder="Your name" maxlength="60" />
          </div>
          <div class="form-group">
            <label for="profileBio">Bio</label>
            <textarea id="profileBio" placeholder="Tell us about yourself…" maxlength="300"></textarea>
          </div>
          <button class="btn btn-primary" id="saveProfileBtn">Save changes</button>
        </div>
      </div>
    </div>

    <!-- Security tab -->
    <div class="tab-panel" id="securityPanel">
      <div class="card">
        <div class="card-header">Change Password</div>
        <div class="card-body">
          <div class="alert" id="pwAlert"></div>
          <div class="form-group">
            <label for="pwCurrent">Current password</label>
            <input id="pwCurrent" type="password" placeholder="••••••••" autocomplete="current-password" />
          </div>
          <div class="form-group">
            <label for="pwNew">New password</label>
            <input id="pwNew" type="password" placeholder="••••••••" autocomplete="new-password" />
            <div class="pw-strength" id="pwStrength">
              <span></span><span></span><span></span><span></span>
            </div>
          </div>
          <div class="form-group">
            <label for="pwConfirm">Confirm new password</label>
            <input id="pwConfirm" type="password" placeholder="••••••••" autocomplete="new-password" />
          </div>
          <button class="btn btn-primary" id="changePasswordBtn">Update password</button>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="/static/app.js"></script>
</body>
</html>
