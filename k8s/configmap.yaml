apiVersion: v1
kind: ConfigMap
metadata:
  name: moose-config
  namespace: moose
data:
  APP_NAME: "Moose Web App Lite"
  APP_ENV: "production"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  DATABASE_URL: "sqlite+aiosqlite:////data/app.db"
  INVITE_ONLY: "false"
  RATE_LIMIT_ENABLED: "true"
  SECURITY_HEADERS_ENABLED: "true"
  # Set this to your actual domain/IP, used in password-reset links
  APP_BASE_URL: "http://moose.local"
