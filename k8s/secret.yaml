# IMPORTANT: Replace the SECRET_KEY value before deploying.
# Generate a strong key with: python3 -c "import secrets; print(secrets.token_hex(32))"
#
# To apply without committing secrets to git, use:
#   kubectl create secret generic moose-secret \
#     --namespace moose \
#     --from-literal=SECRET_KEY=<your-key>
#
# Or seal with Sealed Secrets / External Secrets Operator for GitOps workflows.
apiVersion: v1
kind: Secret
metadata:
  name: moose-secret
  namespace: moose
type: Opaque
stringData:
  SECRET_KEY: "change-me-in-production"
