services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data        # persist SQLite database
      - ./static:/app/static    # live static file updates
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
